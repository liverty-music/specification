name: Buf PR Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - "proto/**"
              - "buf.yaml"
              - "buf.gen.yaml"
              - "Makefile"
              - ".github/workflows/**"

  buf-checks:
    needs: changes
    if: needs.changes.outputs.src == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup buf CLI
        uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          setup_only: true

      - name: Run make lint
        run: make lint

  buf-checks-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping Buf PR checks"

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [changes, buf-checks, buf-checks-skip]
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: buf-checks, buf-checks-skip
          jobs: ${{ toJSON(needs) }}
