# https://github.com/anthropics/claude-code-action/blob/main/examples/pr-review-comprehensive.yml
name: PR Review with Progress Tracking

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Enable progress tracking
          track_progress: true

          # Your custom review instructions
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. **API Design (Google AIP)**
               - Resource and method naming follow AIP conventions (e.g., AIP-121, AIP-131–135)
               - Standard fields (name, create_time, update_time, etc.) are present where required
               - Pagination, filtering, and ordering patterns conform to AIP-158, AIP-160

            2. **Breaking Changes**
               - Field numbers are never reused or removed from existing messages
               - No removal or rename of existing RPC methods or message types
               - Reserved fields and enum values are used correctly

            3. **Documentation**
               - Every message, field, and RPC has a meaningful comment
               - Comments describe business semantics, not just technical structure
               - Deprecated fields are marked with the `deprecated` option and a migration note

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general observations or praise.

          # Tools for comprehensive PR review
          claude_args: |
            --max-turns 5
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

# When track_progress is enabled:
# - Creates a tracking comment with progress checkboxes
# - Includes all PR context (comments, attachments, images)
# - Updates progress as the review proceeds
# - Marks as completed when done
