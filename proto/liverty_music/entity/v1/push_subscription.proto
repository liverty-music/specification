syntax = "proto3";

package liverty_music.entity.v1;

import "buf/validate/validate.proto";
import "liverty_music/entity/v1/user.proto";

option go_package = "github.com/liverty-music/specification/gen/go/liverty_music/entity/v1;entityv1";

// PushSubscriptionId is a globally unique identifier for a stored push subscription record.
//
// The identifier is minted by the backend when the subscription is first persisted and
// remains stable across subsequent updates (upserts keyed by endpoint).
message PushSubscriptionId {
  // A UUID string identifying the push subscription record.
  string value = 1 [(buf.validate.field).string.uuid = true];
}

// PushEndpoint is the delivery URL provided by the browser's push service
// (e.g., Mozilla autopush, Google FCM) that uniquely identifies a single browser
// session at the push service.
//
// The endpoint is the only field that can identify a specific browser session —
// a single user may hold multiple PushEndpoints simultaneously (one per active
// browser or device).
message PushEndpoint {
  // The push service URL for this browser session. Must be a valid absolute URI
  // and must not exceed 2048 characters.
  string value = 1 [(buf.validate.field).string = {
    uri: true
    max_len: 2048
  }];
}

// PushKeys carries the cryptographic material required to encrypt notification
// payloads according to the Web Push Encryption specification (RFC 8291).
//
// Both keys are generated by the browser's PushManager API at subscription time
// and must be forwarded to the platform without modification.
message PushKeys {
  // The Base64url-encoded ECDH (P-256) public key generated by the browser for
  // this subscription. Used by the server to encrypt notification payloads so
  // that only the subscribing browser can decrypt them.
  string p256dh = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  // The Base64url-encoded authentication secret generated by the browser for
  // this subscription. Combined with p256dh, it forms the cryptographic material
  // required by the Web Push Encryption specification.
  string auth = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
}

// PushSubscription represents a single browser's Web Push subscription registered
// against a user account.
//
// A PushSubscription is the authoritative channel through which the Liverty Music
// backend delivers push notifications to a specific browser session. A single user
// may hold multiple PushSubscriptions simultaneously — one per active browser or
// device — and each subscription is uniquely identified by its PushEndpoint.
//
// Relationship with browser state:
//   - The browser's PushManager owns the subscription lifecycle on the client side.
//   - The backend row stored in the `push_subscriptions` table mirrors that state
//     so the server can encrypt and deliver notifications.
//   - Divergence between the two (e.g., browser cleared, server row stale) is
//     reconciled client-side via a self-healing flow described in the
//     push-notification-service capability spec.
message PushSubscription {
  // The unique system identifier for this subscription record.
  PushSubscriptionId id = 1 [(buf.validate.field).required = true];

  // The user who owns this subscription. A user may own multiple subscriptions —
  // one per registered browser.
  UserId user_id = 2 [(buf.validate.field).required = true];

  // The push service endpoint URL that uniquely identifies the browser session.
  // The backend enforces uniqueness on this field across the entire user base.
  PushEndpoint endpoint = 3 [(buf.validate.field).required = true];

  // The cryptographic key material required to encrypt notification payloads
  // deliverable to this browser session.
  PushKeys keys = 4 [(buf.validate.field).required = true];
}
