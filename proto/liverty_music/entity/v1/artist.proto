syntax = "proto3";

package liverty_music.entity.v1;

import "buf/validate/validate.proto";
import "liverty_music/entity/v1/entity.proto";

// Artist represents a musical performer or band.
// This is a central entity that fans follow to stay informed about upcoming
// concerts and official releases.
message Artist {
  // The unique identifier for the artist.
  ArtistId id = 1 [(buf.validate.field).required = true];

  // The professional name of the artist or ensemble.
  ArtistName name = 2 [(buf.validate.field).required = true];

  // Required. The unique identifier for the artist in MusicBrainz.
  Mbid mbid = 3 [(buf.validate.field).required = true];

  // Community-curated artist images from fanart.tv.
  // Absent when no image data has been fetched or the artist has no fanart.tv entry.
  optional Fanart fanart = 4;
}

// ArtistId is a globally unique identifier for an artist.
message ArtistId {
  // A UUID string mapping to the artist's unique identity.
  string value = 1 [(buf.validate.field).string.uuid = true];
}

// ArtistName represents the public display name of an artist.
message ArtistName {
  // The name string, required to be at least one character.
  string value = 1 [(buf.validate.field).string.min_len = 1];
}

// Mbid is a globally unique identifier for an artist in MusicBrainz.
message Mbid {
  // A UUID string mapping to the artist's MusicBrainz identity.
  string value = 1 [(buf.validate.field).string.uuid = true];
}

// OfficialSite represents an artist's official online presence.
message OfficialSite {
  // The unique identifier for this official site record.
  OfficialSiteId id = 1 [(buf.validate.field).required = true];

  // The fully qualified URL to the official site resource.
  Url url = 2 [(buf.validate.field).required = true];

  // The unique identifier of the artist associated with this site.
  ArtistId artist_id = 3 [(buf.validate.field).required = true];
}

// OfficialSiteId is a unique identifier for an official site link.
message OfficialSiteId {
  // A UUID string representing the unique identity of the official site record.
  string value = 1 [(buf.validate.field).string.uuid = true];
}

// Fanart holds community-curated artist images sourced from fanart.tv.
// Each field carries the best image URL (highest community votes) for that image type.
// All fields are optional because fanart.tv coverage varies by artist.
message Fanart {
  // A square portrait or photo of the artist (1000x1000).
  optional Url artist_thumb = 1;

  // A high-resolution backdrop image (1920x1080).
  optional Url artist_background = 2;

  // A high-definition transparent logo of the artist name (800x310).
  optional Url hd_music_logo = 3;

  // A standard-definition transparent logo of the artist name (400x155).
  // Used as a fallback when hd_music_logo is unavailable.
  optional Url music_logo = 4;

  // A wide banner image for the artist (1000x185).
  optional Url music_banner = 5;

  // Dominant color properties extracted from the best logo image.
  // Used by the frontend to derive a card background color that
  // maximizes contrast with the logo.
  // Absent when no logo image is available or analysis has not been performed.
  optional LogoColorProfile logo_color_profile = 6;
}

// LogoColorProfile summarizes the dominant color characteristics of an artist's
// logo image. The frontend uses these values to compute an optimal card
// background color that ensures the logo remains visually distinguishable.
message LogoColorProfile {
  // The dominant hue angle in the OKLCH color space (0–360 degrees).
  // Meaningful only when `is_chromatic` is true; ignored for achromatic logos.
  float dominant_hue = 1;

  // The mean perceptual lightness of non-transparent pixels (0–1, OKLCH L).
  // Determines whether the logo is light or dark, which informs background
  // lightness adjustment.
  float dominant_lightness = 2;

  // Whether the logo contains significant color (> 30% of non-transparent
  // pixels have OKLCH chroma > 0.04). When false, the logo is essentially
  // grayscale and the frontend falls back to the artist-name hash for hue.
  bool is_chromatic = 3;
}
