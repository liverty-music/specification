syntax = "proto3";

// Package liverty_music.entity.v1 defines core business entities for the Liverty Music platform.
package liverty_music.entity.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "liverty_music/entity/v1/entity.proto";
import "liverty_music/entity/v1/series.proto";
import "liverty_music/entity/v1/venue.proto";

option go_package = "github.com/liverty-music/specification/gen/go/liverty_music/entity/v1;entityv1";

// EventId uniquely identifies a music event (concert, live session, etc.) on the platform.
// Events represent scheduled performances at a venue, and this identifier links tickets
// and entry records back to the specific event they belong to.
message EventId {
  // value is the UUID that uniquely identifies this event across the platform.
  string value = 1 [(buf.validate.field).string.uuid = true];
}

// Event represents a single performance occurring on a specific date at a specific venue.
// Every Event belongs to a parent Series that owns shared metadata such as the tour or
// festival title. Series-level fields (title, source URL, type) are intentionally absent
// from Event to avoid duplication across multiple events that share the same series.
// Performing artists are modelled as an M:N relation outside this message; consumers
// should consult `event_performers` to resolve who is performing.
message Event {
  // Field number 3 was previously occupied by `Title title`, which has been
  // promoted to the parent Series. Reserved to prevent accidental reuse.
  reserved 3;
  reserved "title";

  // id is the unique identifier for this event within the Liverty Music platform.
  EventId id = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).required = true
  ];

  // venue is the physical location where this event will take place.
  // Populated by the server; includes name and admin_area when available.
  Venue venue = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (buf.validate.field).required = true
  ];

  // local_date is the calendar date of the event in the venue's local timezone.
  // This date is displayed to fans when browsing or purchasing tickets.
  LocalDate local_date = 4 [(buf.validate.field).required = true];

  // start_time is the timestamp when the performance is scheduled to begin.
  // This field is optional and may be omitted for events where the start time is not yet confirmed.
  StartTime start_time = 5;

  // open_time is the timestamp when venue doors open for fan entry.
  // This field is optional and may be omitted when door times have not been announced.
  OpenTime open_time = 6;

  // merkle_root is the root hash of the Merkle tree built from all ticket holders for this event.
  // It is only set for events that use zero-knowledge proof entry verification. The root is
  // published on-chain and allows entry validators to verify membership without querying
  // a central database, preserving fan privacy.
  optional bytes merkle_root = 7 [(buf.validate.field).bytes.len = 32];

  // series_id references the parent Series that aggregates this event with any
  // sibling events sharing the same tour, festival, or multi-day run.
  // Declared at the end of the message in source order to match its appended
  // wire-format number (8), keeping the visual / numeric order monotonic.
  // Marked REQUIRED rather than OUTPUT_ONLY because it is a caller-supplied
  // foreign-key reference (in any future CreateEvent / BulkImport flow the
  // client identifies which Series the event belongs to), not a server-
  // generated value like Event.id.
  SeriesId series_id = 8 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}
