syntax = "proto3";

package liverty_music.rpc.concert.v1;

import "buf/validate/validate.proto";
import "liverty_music/entity/v1/artist.proto";
import "liverty_music/entity/v1/concert.proto";
import "liverty_music/entity/v1/entity.proto";

// ConcertService provides operations for managing the catalog of musical concerts.
// It acts as the primary data source for upcoming live music events.
service ConcertService {
  // List retrieves a collection of concert events, filtered by the performing artist.
  //
  // Possible errors:
  // - INVALID_ARGUMENT: The request is missing a required field or contains invalid data.
  // - NOT_FOUND: No concerts were found for the specified artist.
  rpc List(ListRequest) returns (ListResponse);

  // ListByFollower retrieves all concerts for artists followed by the authenticated user.
  // The caller's identity is determined from the authentication context.
  //
  // Possible errors:
  // - UNAUTHENTICATED: The user identity could not be verified.
  rpc ListByFollower(ListByFollowerRequest) returns (ListByFollowerResponse);

  // SearchNewConcerts triggers an asynchronous discovery process for new concerts.
  // It enqueues a background search job and returns immediately. The actual search
  // runs asynchronously with a 120-second timeout and publishes a
  // concert.discovered.v1 event for downstream consumers.
  //
  // Possible errors:
  // - INVALID_ARGUMENT: The artist ID is missing or invalid.
  // - NOT_FOUND: The specified artist does not exist.
  rpc SearchNewConcerts(SearchNewConcertsRequest) returns (SearchNewConcertsResponse);

  // ListSearchStatuses returns the current search status for one or more artists.
  // Use this to poll for completion after calling SearchNewConcerts.
  //
  // Possible errors:
  // - INVALID_ARGUMENT: The artist IDs list is empty or contains invalid IDs.
  rpc ListSearchStatuses(ListSearchStatusesRequest) returns (ListSearchStatusesResponse);
}

// ListRequest is the request for retrieving concerts associated with a specific artist.
message ListRequest {
  // Required. The unique identifier of the artist whose concerts are to be listed.
  entity.v1.ArtistId artist_id = 1 [(buf.validate.field).required = true];
}

// ListResponse contains the collection of concerts matching the ListRequest.
message ListResponse {
  // The collection of concert events found.
  repeated entity.v1.Concert concerts = 1;
}

// ListByFollowerRequest is the request for retrieving concerts for all artists
// followed by the authenticated user. No fields are required; the user identity
// is determined from the authentication context.
message ListByFollowerRequest {}

// ListByFollowerResponse contains concerts for all artists followed by the caller,
// grouped by date and classified by geographic proximity.
message ListByFollowerResponse {
  reserved 1;
  reserved "concerts";

  // Concert groups ordered by date ascending. Each group contains concerts
  // for a single date, classified into home/nearby/away buckets based on
  // the geographic proximity between the user's home area and each venue.
  repeated ProximityGroup groups = 2;
}

// ProximityGroup contains concerts for a single calendar date, classified into
// three geographic proximity buckets relative to the authenticated user's home area.
message ProximityGroup {
  reserved "distant";

  // The calendar date for this group.
  entity.v1.LocalDate date = 1 [(buf.validate.field).required = true];

  // Concerts at venues within the user's home area (admin_area matches home.level_1).
  repeated entity.v1.Concert home = 2;

  // Concerts at venues within 200km of the user's home area centroid.
  repeated entity.v1.Concert nearby = 3;

  // Concerts at venues beyond 200km, with unknown location, or when the user has no home set.
  repeated entity.v1.Concert away = 4;
}

// SearchNewConcertsRequest specifies the artist for whom to search for new concerts.
message SearchNewConcertsRequest {
  // Required. The unique identifier of the artist.
  entity.v1.ArtistId artist_id = 1 [(buf.validate.field).required = true];
}

// SearchNewConcertsResponse is intentionally empty. Concert persistence happens
// asynchronously via event-driven consumers after the discovery process publishes
// a concert.discovered.v1 event.
message SearchNewConcertsResponse {
  reserved 1;
  reserved "concerts";
}

// ListSearchStatusesRequest specifies the artists whose search status is queried.
message ListSearchStatusesRequest {
  // Required. The artist identifiers to query search status for.
  repeated entity.v1.ArtistId artist_ids = 1 [(buf.validate.field).repeated.min_items = 1];
}

// ListSearchStatusesResponse contains the search status for each requested artist.
message ListSearchStatusesResponse {
  // The search status for each requested artist.
  repeated ArtistSearchStatus statuses = 1;
}

// ArtistSearchStatus represents the current search status for a single artist.
message ArtistSearchStatus {
  // The artist identifier.
  entity.v1.ArtistId artist_id = 1;

  // The current search status.
  SearchStatus status = 2;
}

// SearchStatus indicates the state of a concert search job for an artist.
enum SearchStatus {
  // Default value. No search log exists for this artist.
  SEARCH_STATUS_UNSPECIFIED = 0;

  // A search is currently in progress.
  SEARCH_STATUS_PENDING = 1;

  // The search completed successfully.
  SEARCH_STATUS_COMPLETED = 2;

  // The search failed after all retries.
  SEARCH_STATUS_FAILED = 3;
}
