syntax = "proto3";

package liverty_music.rpc.push_notification.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/liverty-music/specification/gen/go/liverty_music/rpc/push_notification/v1;pushnotificationv1";

// PushNotificationService manages the lifecycle of browser push subscriptions
// for authenticated Liverty Music users. A push subscription represents a
// direct channel between the Liverty Music backend and a specific browser
// session, enabling the platform to proactively notify users about upcoming
// concerts, new releases from followed artists, and other time-sensitive
// events.
service PushNotificationService {
  // Subscribe registers a new browser push subscription for the authenticated
  // user. The subscription materials are obtained from the browser's Web Push
  // API and must be forwarded to this endpoint so the platform can later
  // deliver notifications to that browser session.
  //
  // The caller must supply the three pieces of information that together
  // uniquely identify a push channel: the push service endpoint URL, the
  // ECDH public key (p256dh), and the authentication secret (auth).
  //
  // If the endpoint is already registered, the existing record is updated
  // with the new key material (upsert behavior).
  //
  // Possible errors:
  //   - UNAUTHENTICATED: The request does not carry a valid user session.
  //   - INVALID_ARGUMENT: One or more of the required subscription fields
  //     is missing, empty, or not a valid URI (for the endpoint field).
  //   - INTERNAL: An unexpected error occurred while persisting the
  //     subscription.
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse);

  // Unsubscribe removes all browser push subscriptions associated with the
  // authenticated user. After this call completes successfully, the platform
  // will no longer attempt to deliver push notifications to any of the user's
  // previously registered browser sessions.
  //
  // This operation is idempotent: calling it when the user has no active
  // subscriptions returns a successful response without error.
  //
  // Possible errors:
  //   - UNAUTHENTICATED: The request does not carry a valid user session.
  //   - INTERNAL: An unexpected error occurred while removing the
  //     subscriptions.
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
}

// SubscribeRequest carries the browser-generated Web Push subscription
// materials that the platform needs in order to deliver notifications to a
// specific browser session. All three fields are produced by the browser's
// PushManager API and must be forwarded to this service without modification.
message SubscribeRequest {
  // endpoint is the unique URL provided by the user's browser push service
  // (e.g., Mozilla's autopush or Google's FCM) that the platform calls when
  // delivering a notification to this browser session. It must be a valid
  // absolute URI.
  string endpoint = 1 [(buf.validate.field).string.uri = true];

  // p256dh is the Elliptic Curve Diffie-Hellman (ECDH) public key generated
  // by the browser for this subscription. The platform uses it to encrypt
  // notification payloads so that only the subscribing browser can decrypt
  // them. The value is Base64url-encoded and must not be empty.
  string p256dh = 2 [(buf.validate.field).string.min_len = 1];

  // auth is the authentication secret generated by the browser for this
  // subscription. Together with the p256dh key, it forms the cryptographic
  // material required to encrypt notification payloads according to the Web
  // Push Encryption specification. The value is Base64url-encoded and must
  // not be empty.
  string auth = 3 [(buf.validate.field).string.min_len = 1];
}

// SubscribeResponse is returned upon successful registration of a browser push
// subscription. An empty response confirms that the subscription has been
// persisted and the platform is ready to deliver notifications to the
// registered browser session.
message SubscribeResponse {}

// UnsubscribeRequest initiates the removal of all browser push subscriptions
// belonging to the authenticated user. No additional input is required because
// the user identity is established from the authenticated session context.
message UnsubscribeRequest {}

// UnsubscribeResponse is returned upon successful removal of all browser push
// subscriptions for the authenticated user. An empty response confirms that
// the platform will no longer attempt to deliver push notifications to any
// of the user's previously registered browser sessions.
message UnsubscribeResponse {}
