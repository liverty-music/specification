syntax = "proto3";

package liverty_music.rpc.push_notification.v1;

import "buf/validate/validate.proto";
import "liverty_music/entity/v1/artist.proto";
import "liverty_music/entity/v1/event.proto";
import "liverty_music/entity/v1/push_subscription.proto";
import "liverty_music/entity/v1/user.proto";

option go_package = "github.com/liverty-music/specification/gen/go/liverty_music/rpc/push_notification/v1;pushnotificationv1";

// PushNotificationService manages the lifecycle of browser push subscriptions
// for authenticated Liverty Music users. A push subscription represents a
// direct channel between the Liverty Music backend and a specific browser
// session, enabling the platform to proactively notify users about upcoming
// concerts, new releases from followed artists, and other time-sensitive
// events.
//
// Subscriptions are keyed by the browser-provided endpoint URL. A single user
// may hold multiple subscriptions simultaneously — one per active browser. The
// Get and Delete methods operate on the unique (user, endpoint) pair so that
// each RPC call affects only the specific browser session the caller names.
service PushNotificationService {
  // Create registers the calling browser's push subscription for the
  // authenticated user. The subscription materials are obtained from the
  // browser's PushManager API and must be forwarded to this endpoint so the
  // platform can later deliver notifications to that browser session.
  //
  // If the endpoint is already registered, the existing record is updated
  // with the new key material (upsert behaviour).
  //
  // Possible errors:
  //   - UNAUTHENTICATED: The request does not carry a valid user session.
  //   - INVALID_ARGUMENT: One or more of the required subscription fields
  //     is missing, empty, or not a valid URI (for the endpoint field).
  //   - INTERNAL: An unexpected error occurred while persisting the
  //     subscription.
  rpc Create(CreateRequest) returns (CreateResponse);

  // Get retrieves the push subscription uniquely identified by the supplied
  // (user_id, endpoint) pair.
  //
  // The user_id field must match the userID derived from the authenticated
  // session; mismatches are rejected with PERMISSION_DENIED to prevent cross-
  // user disclosure. The settings page uses this RPC to determine whether a
  // given browser's subscription is known to the backend; a NOT_FOUND response
  // triggers the client's self-heal flow (re-registration via Create).
  //
  // Possible errors:
  //   - UNAUTHENTICATED: The request does not carry a valid user session.
  //   - PERMISSION_DENIED: The supplied user_id does not match the userID
  //     derived from the authenticated session.
  //   - NOT_FOUND: No subscription exists for the supplied (user_id, endpoint)
  //     pair.
  //   - INVALID_ARGUMENT: The request is missing user_id or endpoint, or one
  //     of them fails validation.
  //   - INTERNAL: An unexpected error occurred while querying the store.
  rpc Get(GetRequest) returns (GetResponse);

  // Delete removes the push subscription uniquely identified by the supplied
  // (user_id, endpoint) pair. Only the specified browser's subscription is
  // removed; other browsers registered by the same user remain active.
  //
  // The user_id field must match the userID derived from the authenticated
  // session; mismatches are rejected with PERMISSION_DENIED. The operation is
  // idempotent: deleting a subscription that does not exist returns a
  // successful empty response.
  //
  // Possible errors:
  //   - UNAUTHENTICATED: The request does not carry a valid user session.
  //   - PERMISSION_DENIED: The supplied user_id does not match the userID
  //     derived from the authenticated session.
  //   - INVALID_ARGUMENT: The request is missing user_id or endpoint, or one
  //     of them fails validation.
  //   - INTERNAL: An unexpected error occurred while removing the
  //     subscription.
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // NotifyNewConcerts triggers the push notification delivery pipeline for a
  // specific set of newly created concerts belonging to an artist. This RPC
  // invokes the same code path as the CONCERT.created event consumer, but
  // bypasses the NATS event bus for deterministic integration testing and
  // operator-initiated re-delivery.
  //
  // This RPC is restricted to non-production environments. In production the
  // server returns PERMISSION_DENIED regardless of the caller's credentials.
  //
  // Possible errors:
  //   - UNAUTHENTICATED: The request does not carry a valid user session.
  //   - PERMISSION_DENIED: The server is running in a production environment.
  //   - INVALID_ARGUMENT: One or more concert_ids do not belong to the
  //     specified artist, or validation constraints are not met.
  rpc NotifyNewConcerts(NotifyNewConcertsRequest) returns (NotifyNewConcertsResponse);
}

// CreateRequest carries the browser-generated Web Push
// subscription materials that the platform needs in order to deliver
// notifications to the calling browser session.
//
// The authenticated user is always the owner of the created subscription;
// clients do not supply a user_id here because the session context already
// identifies the caller.
message CreateRequest {
  // The push service endpoint URL provided by the browser's PushManager API.
  entity.v1.PushEndpoint endpoint = 1 [(buf.validate.field).required = true];

  // The ECDH public key and authentication secret generated by the browser.
  entity.v1.PushKeys keys = 2 [(buf.validate.field).required = true];
}

// CreateResponse returns the persisted subscription entity so
// the client can record the minted PushSubscriptionId if desired.
message CreateResponse {
  // The newly created (or upserted) subscription, including its assigned id.
  entity.v1.PushSubscription subscription = 1 [(buf.validate.field).required = true];
}

// GetRequest identifies a subscription by the unique
// (user_id, endpoint) pair.
//
// The user_id is supplied explicitly so the handler can verify it against
// the JWT-derived userID and reject cross-user queries before any store
// lookup is performed.
message GetRequest {
  // The caller's user identifier. Must match the userID derived from the
  // authenticated session; mismatches are rejected with PERMISSION_DENIED.
  entity.v1.UserId user_id = 1 [(buf.validate.field).required = true];

  // The push service endpoint URL identifying the specific browser session.
  entity.v1.PushEndpoint endpoint = 2 [(buf.validate.field).required = true];
}

// GetResponse returns the subscription matching the requested
// (user_id, endpoint) pair. If no matching subscription exists, the RPC
// returns NOT_FOUND rather than an empty response so clients can branch on
// the error path alone.
message GetResponse {
  // The subscription matching the requested (user_id, endpoint) pair.
  entity.v1.PushSubscription subscription = 1 [(buf.validate.field).required = true];
}

// DeleteRequest identifies the subscription to remove by the
// unique (user_id, endpoint) pair.
//
// The user_id is supplied explicitly so the handler can verify it against
// the JWT-derived userID and reject cross-user deletions before any row is
// touched.
message DeleteRequest {
  // The caller's user identifier. Must match the userID derived from the
  // authenticated session; mismatches are rejected with PERMISSION_DENIED.
  entity.v1.UserId user_id = 1 [(buf.validate.field).required = true];

  // The push service endpoint URL identifying the specific browser session to
  // remove. Only this endpoint's row is deleted; other registered browsers
  // remain active.
  entity.v1.PushEndpoint endpoint = 2 [(buf.validate.field).required = true];
}

// DeleteResponse is returned upon successful removal. An empty
// response confirms that the specified (user_id, endpoint) pair no longer has
// a persisted subscription. Deleting a subscription that did not exist also
// returns a successful empty response (idempotency).
message DeleteResponse {}

// NotifyNewConcertsRequest identifies the artist and the specific set of
// newly created concerts for which push notifications should be delivered.
//
// The caller must supply at least one concert identifier, and every supplied
// identifier must belong to the specified artist. If any identifier does not
// resolve to a concert owned by the artist, the entire request is rejected
// with INVALID_ARGUMENT (no partial delivery).
message NotifyNewConcertsRequest {
  // The artist whose followers should be notified.
  entity.v1.ArtistId artist_id = 1 [(buf.validate.field).required = true];

  // The identifiers of the concerts that were just created. Each must be a
  // valid event UUID belonging to the specified artist. The delivery pipeline
  // computes hype-level filtering and notification payloads exclusively from
  // this set — pre-existing concerts for the same artist are excluded.
  repeated entity.v1.EventId concert_ids = 2 [(buf.validate.field) = {
    required: true
    repeated: {
      min_items: 1
      max_items: 1000
    }
  }];
}

// NotifyNewConcertsResponse is returned after the delivery pipeline completes.
// Currently empty; reserved for future delivery statistics.
message NotifyNewConcertsResponse {}
